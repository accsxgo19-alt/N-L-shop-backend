<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập/Đăng ký bằng số điện thoại</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(255,255,255,0.08);
            --card-border: rgba(255,255,255,0.16);
            --text: #f8fafc;
            --muted: #b8c3e8;
            --input-bg: rgba(255,255,255,0.06);
            --input-border: rgba(255,255,255,0.14);
            --primary: linear-gradient(135deg, #ff6ec7, #7f5af0);
            --primary-hover: linear-gradient(135deg, #ff5cc0, #6f49e0);
        }
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a2847 50%, var(--bg) 100%);
            color: var(--text);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(127, 90, 240, 0.18), transparent 24%),
                        radial-gradient(circle at 85% 15%, rgba(255, 110, 199, 0.14), transparent 26%),
                        radial-gradient(circle at 50% 80%, rgba(0, 194, 255, 0.08), transparent 20%);
            pointer-events: none;
            z-index: -1;
        }
        .auth-page {
            max-width: 780px;
            margin: 0 auto;
            padding: 32px 18px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            align-items: center;
            min-height: 100vh;
        }
        .auth-left {
            background: var(--card);
            border-radius: 32px;
            border: 1px solid var(--card-border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.35);
            padding: 40px 36px;
            backdrop-filter: blur(24px);
        }
        .auth-left h1 {
            margin: 0 0 12px;
            font-size: 34px;
            line-height: 1.05;
            color: #fff;
        }
        .auth-left p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.8;
        }
        .form-panel {
            display: grid;
            gap: 18px;
        }
        .form-panel .input-group {
            display: grid;
            gap: 10px;
        }
        .form-panel label {
            font-size: 14px;
            color: var(--muted);
        }
        .form-panel input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--input-border);
            padding: 16px 18px;
            font-size: 15px;
            background: var(--input-bg);
            color: var(--text);
        }
        .form-panel input:focus {
            outline: none;
            border-color: rgba(127, 90, 240, 0.7);
            box-shadow: 0 0 0 4px rgba(127, 90, 240, 0.12);
        }
        .primary-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 18px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.25s ease;
        }
        .primary-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: var(--primary-hover);
        }
        .primary-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message-box {
            min-height: 24px;
            font-size: 14px;
            color: #ff9b9d;
            font-weight: 600;
        }
        .success-message {
            color: #7ad29a;
        }
        .otp-countdown {
            font-size: 13px;
            color: #7ad29a;
            min-height: 18px;
            margin-top: 4px;
            text-align: right;
            font-weight: 500;
        }
        .auth-link {
            text-align: center;
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
        }
        .auth-link a {
            color: #8bd1ff;
            font-weight: 700;
            text-decoration: none;
        }
        .auth-link a:hover {
            color: #d8a4ff;
        }
        @media (max-width: 768px) {
            .auth-page {
                padding: 20px 14px;
            }
            .auth-left {
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <h1 id="pageTitle">Xác thực số điện thoại</h1>
            <p id="pageSubtitle">Sử dụng số điện thoại để đăng nhập hoặc đăng ký nhanh chóng.</p>
            <div class="form-panel">
                <div class="input-group" id="nameGroup" style="display:none;">
                    <label for="phoneName">Họ và tên</label>
                    <input id="phoneName" type="text" placeholder="Nhập họ và tên của bạn">
                </div>
                <div class="input-group">
                    <label for="phoneNumber">Số điện thoại</label>
                    <input id="phoneNumber" type="tel" placeholder="Nhập số điện thoại">
                </div>
                <button type="button" id="sendOtpBtn" class="primary-btn">Gửi mã OTP</button>
                <div class="input-group" id="passwordGroup" style="display:none;">
                    <label for="phonePassword">Mật khẩu mới</label>
                    <input id="phonePassword" type="password" placeholder="Tạo mật khẩu">
                </div>
                <div class="input-group" id="confirmPasswordGroup" style="display:none;">
                    <label for="phoneConfirmPassword">Xác nhận mật khẩu</label>
                    <input id="phoneConfirmPassword" type="password" placeholder="Nhập lại mật khẩu">
                </div>
                <div class="input-group" id="otpGroup" style="display:none;">
                    <label for="phoneOtp">Mã OTP</label>
                    <input id="phoneOtp" type="text" placeholder="Nhập mã OTP">
                </div>
                <div id="countdownText" class="otp-countdown"></div>
                <button type="button" id="verifyOtpBtn" class="primary-btn" style="display:none;">Xác thực OTP</button>
                <div id="otpError" class="message-box"></div>
                <p class="auth-link"><a id="backLink" href="login.html">Quay lại trang trước</a></p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
        <script src="chatbot-knowledge.js"></script>
        <script src="chatbot.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') === 'register' ? 'register' : 'login';
        const titleEl = document.getElementById('pageTitle');
        const subtitleEl = document.getElementById('pageSubtitle');
        const backLink = document.getElementById('backLink');
        const nameGroup = document.getElementById('nameGroup');
        const phoneInput = document.getElementById('phoneNumber');
        const nameInput = document.getElementById('phoneName');
        const otpInput = document.getElementById('phoneOtp');
        const passwordGroup = document.getElementById('passwordGroup');
        const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
        const confirmPasswordInput = document.getElementById('phoneConfirmPassword');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const countdownText = document.getElementById('countdownText');
        const otpError = document.getElementById('otpError');

        let countdownInterval = null;
        let remainingSeconds = 0;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function resetMessages() {
            otpError.textContent = '';
            countdownText.textContent = '';
        }

        function updateCountdown() {
            if (remainingSeconds > 0) {
                countdownText.textContent = `Mã OTP còn hiệu lực trong ${remainingSeconds}s.`;
                sendOtpBtn.disabled = true;
            } else {
                countdownText.textContent = 'Bạn có thể gửi lại mã OTP.';
                sendOtpBtn.disabled = false;
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        }

        function startCountdown() {
            remainingSeconds = 30;
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            updateCountdown();
            countdownInterval = setInterval(() => {
                remainingSeconds -= 1;
                updateCountdown();
            }, 1000);
        }

        function eachMode() {
            if (mode === 'register') {
                titleEl.textContent = 'Đăng ký bằng số điện thoại';
                subtitleEl.textContent = 'Nhập số điện thoại và mã OTP để tạo tài khoản nhanh.';
                backLink.href = 'register.html';
                nameGroup.style.display = 'grid';
                sendOtpBtn.textContent = 'Gửi mã OTP';
                verifyOtpBtn.textContent = 'Xác thực và đăng ký';
            } else {
                titleEl.textContent = 'Đăng nhập bằng số điện thoại';
                subtitleEl.textContent = 'Nhập số điện thoại và mã OTP để đăng nhập nhanh.';
                backLink.href = 'login.html';
                nameGroup.style.display = 'none';
                sendOtpBtn.textContent = 'Gửi mã OTP';
                verifyOtpBtn.textContent = 'Xác thực và đăng nhập';
            }
        }

        function sendOtp() {
            resetMessages();
            const phone = phoneInput.value.trim();
            if (!phone) {
                otpError.textContent = 'Vui lòng nhập số điện thoại.';
                return;
            }
            const result = sendPhoneOtp(phone);
            if (!result.success) {
                otpError.textContent = result.message;
                return;
            }
            countdownText.textContent = result.message;
            startCountdown();
            passwordGroup.style.display = 'grid';
            confirmPasswordGroup.style.display = 'grid';
            otpGroup.style.display = 'grid';
            verifyOtpBtn.style.display = 'block';
            otpInput.focus();
        }

        function verifyOtp() {
            resetMessages();
            const phone = phoneInput.value.trim();
            const code = otpInput.value.trim();
            const password = document.getElementById('phonePassword').value;
            const confirmPassword = confirmPasswordInput.value;
            if (!phone || !code) {
                otpError.textContent = 'Vui lòng nhập số điện thoại và mã OTP.';
                return;
            }
            if (!password || password.length < 6) {
                otpError.textContent = 'Mật khẩu phải từ 6 ký tự trở lên.';
                return;
            }
            if (password !== confirmPassword) {
                otpError.textContent = 'Mật khẩu xác nhận không khớp.';
                return;
            }
            if (!verifyPhoneOtp(phone, code)) {
                otpError.textContent = 'OTP không đúng hoặc đã hết hạn. Vui lòng thử lại.';
                return;
            }
            if (mode === 'register') {
                loginOrRegisterWithPhone(phone, nameInput.value.trim() || undefined, password);
            } else {
                loginOrRegisterWithPhone(phone, undefined, password);
            }
            window.location.href = 'index.html';
        }

        sendOtpBtn.addEventListener('click', sendOtp);
        verifyOtpBtn.addEventListener('click', verifyOtp);

        passwordGroup.style.display = 'none';
        confirmPasswordGroup.style.display = 'none';
        otpGroup.style.display = 'none';

        eachMode();
    </script>
</body>
</html>
