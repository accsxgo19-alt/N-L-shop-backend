<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - N&L Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body { min-height:100%; margin:0; font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, rgba(118,79,255,0.24), transparent 26%), radial-gradient(circle at bottom right, rgba(49,27,135,0.24), transparent 24%), linear-gradient(135deg, #090714 0%, #140c32 46%, #20184e 100%); color: #eef0ff; }
        .auth-page { max-width: 980px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; display:flex; align-items:center; }
        .card { width:100%; max-width:560px; margin:0 auto; background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); backdrop-filter: blur(18px); border-radius: 24px; padding: 32px; box-shadow: 0 40px 80px rgba(0,0,0,0.28); }
        h1 { margin:0 0 12px; font-size:28px; color:#f9f6ff; text-align:center; }
        p.lead { margin:0 0 20px; color: rgba(255,255,255,0.78); }
        .form-group { display:grid; gap:8px; margin-bottom:14px; }
        label { font-size:14px; color: rgba(255,255,255,0.82); }
        input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color:#eef0ff; }
        .primary-btn { width:100%; padding:12px 16px; border-radius:14px; border:none; background: linear-gradient(135deg,#a75cff,#6931ff); color:#fff; font-weight:700; cursor:pointer; }
        .muted { font-size:13px; color: rgba(255,255,255,0.72); text-align:center; margin-top:12px; }
        .message { min-height:20px; margin-top:8px; font-weight:600; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="card">
            <h1 id="title">Quên mật khẩu</h1>
            <p class="lead" id="subtitle">Nhập email hoặc số điện thoại để nhận mã xác thực để đặt lại mật khẩu mới.</p>

            <div id="requestPanel">
                <div class="form-group">
                    <label for="identifier">Email hoặc Số điện thoại</label>
                    <input id="identifier" type="text" placeholder="Nhập email hoặc số điện thoại của bạn">
                </div>
                <button id="requestBtn" class="primary-btn">Gửi mã</button>
                <div id="countdownText" class="message" style="margin-top:8px;color:rgba(255,255,255,0.78);"></div>
                <div id="requestMessage" class="message"></div>
            </div>

            <div id="verifyPanel" style="display:none; margin-top:10px;">
                <div class="form-group">
                    <label for="code">Mã xác thực</label>
                    <input id="code" type="text" placeholder="Nhập mã bạn vừa nhận">
                </div>
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input id="newPassword" type="password" placeholder="Tối thiểu 6 ký tự">
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Xác nhận mật khẩu</label>
                    <input id="confirmNewPassword" type="password" placeholder="Nhập lại mật khẩu">
                </div>
                <button id="verifyBtn" class="primary-btn">Xác nhận và đặt mật khẩu</button>
                <div id="verifyMessage" class="message"></div>
            </div>

            <p class="muted"><a href="login.html" style="color:#d5c4ff; text-decoration:none; font-weight:700;">Quay về đăng nhập</a></p>
        </div>
    </div>

    <script>
        function $(id){return document.getElementById(id)}
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const emailParam = params.get('email');

        const requestPanel = $('requestPanel');
        const verifyPanel = $('verifyPanel');
        const requestBtn = $('requestBtn');
        const verifyBtn = $('verifyBtn');
        const countdownText = $('countdownText');

        let countdownInterval = null;
        let remaining = 0;

        function startCountdown(seconds) {
            remaining = seconds;
            countdownText.style.color = 'rgba(255,255,255,0.78)';
            updateCountdown();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                remaining -= 1;
                updateCountdown();
            }, 1000);
        }

        function updateCountdown() {
            if (remaining > 0) {
                countdownText.textContent = `Bạn có thể gửi lại mã sau ${remaining}s.`;
                requestBtn.disabled = true;
            } else {
                countdownText.textContent = 'Bạn có thể gửi lại mã.';
                requestBtn.disabled = false;
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            }
        }

        if (token && emailParam) {
            // direct reset via token — show reset panel
            requestPanel.style.display = 'none';
            verifyPanel.style.display = 'block';
            $('newPassword').focus();
            $('identifier').value = decodeURIComponent(emailParam);
            $('title').textContent = 'Đặt mật khẩu mới';
            $('subtitle').textContent = 'Nhập mật khẩu mới cho tài khoản của bạn.';
        }

        requestBtn.addEventListener('click', async () => {
            const id = $('identifier').value.trim();
            const msg = $('requestMessage');
            msg.textContent = '';
            if (!id) { msg.textContent = 'Vui lòng nhập email hoặc số điện thoại.'; return; }
            try {
                await fetch('/api/auth/send-code', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ identifier: id }) });
                msg.style.color = '#7dd3a6';
                msg.textContent = 'Mã đã được gửi. Vui lòng kiểm tra hộp thư';
                // show verify panel to allow entering code and new password
                verifyPanel.style.display = 'block';
                // prefill hidden identifier field if needed
                $('identifier').value = id;
                startCountdown(30);
            } catch (err) {
                msg.style.color = '#fca5a5';
                msg.textContent = 'Đã xảy ra lỗi khi gửi mã.';
                requestBtn.disabled = false;
            }
        });

        verifyBtn.addEventListener('click', async () => {
            const id = $('identifier').value.trim();
            const code = $('code').value.trim();
            const password = $('newPassword').value;
            const confirm = $('confirmNewPassword').value;
            const msg = $('verifyMessage');
            msg.textContent = '';
            if (!code) { msg.textContent = 'Vui lòng nhập mã xác thực.'; return; }
            if (!password || password.length < 6) { msg.textContent = 'Mật khẩu phải ít nhất 6 ký tự.'; return; }
            if (password !== confirm) { msg.textContent = 'Mật khẩu không khớp.'; return; }
            try {
                await fetch('/api/auth/reset-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ identifier: id, code, password }) });
                msg.style.color = '#7dd3a6';
                msg.textContent = 'Mật khẩu đã được đặt lại. Chuyển về trang đăng nhập...';
                setTimeout(()=> window.location.href='login.html', 1400);
            } catch (err) {
                msg.style.color = '#fca5a5';
                msg.textContent = 'Đặt lại mật khẩu không thành công.';
            }
        });
    </script>
</body>
</html>
