<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - N&L Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-9b8rBQcoC0Zj7VdF+Y4Bx1tO6gU6WNLV0jG1lF6cRsm8FfE1uvA0kVZf+9+W5YzCFn4hXkOatFi9bDq0zE+Jw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a2847 50%, #0f172a 100%);
            color: #f8fafc;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(127, 90, 240, 0.18), transparent 24%),
                        radial-gradient(circle at 85% 15%, rgba(255, 110, 199, 0.14), transparent 26%),
                        radial-gradient(circle at 50% 80%, rgba(0, 194, 255, 0.08), transparent 20%);
            pointer-events: none;
            z-index: -1;
        }
        .auth-page {
            max-width: 780px;
            margin: 0 auto;
            padding: 36px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-left {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.32);
            padding: 42px 42px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(24px);
        }
        .auth-left h1 {
            margin: 0 0 10px;
            font-size: 38px;
            line-height: 1.05;
            color: #ffffff;
        }
        .auth-left p {
            margin: 0 0 24px;
            color: #c8d1ea;
            font-size: 16px;
            line-height: 1.8;
        }
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 50px rgba(90, 43, 167, 0.12);
            background: rgba(255, 255, 255, 0.12);
        }
        .social-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }
        .social-btn span {
            display: inline-flex;
            align-items: center;
            line-height: 1;
        }
        .social-google {
            color: #f8fafc;
        }
        .social-facebook {
            color: #f8fafc;
        }
        .social-phone {
            color: #f8fafc;
        }
        .register-form {
            display: grid;
            gap: 18px;
        }
        .form-group {
            display: grid;
            gap: 10px;
        }
        .form-group label {
            font-size: 14px;
            color: #cbd5e1;
        }
        .form-group input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            padding: 16px 18px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-group input:focus {
            border-color: rgba(127, 90, 240, 0.7);
            box-shadow: 0 0 0 4px rgba(127, 90, 240, 0.14);
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            margin-top: 0;
            accent-color: #ff6ec7;
        }
        .checkbox-label a {
            color: #8bd1ff;
            text-decoration: underline;
            font-weight: 600;
        }
        .checkbox-label a:hover {
            color: #d8a4ff;
        }
        .phone-auth-panel {
            display: none;
            margin-bottom: 24px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
        }
        .phone-auth-panel h3 {
            margin: 0 0 16px;
            font-size: 18px;
            color: #f8fafc;
        }
        .phone-auth-panel .message-box {
            min-height: 20px;
            color: #7ad29a;
        }
        .password-field {
            position: relative;
        }
        .password-field input {
            width: 100%;
            padding-right: 54px;
        }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            font-size: 18px;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border-radius: 12px;
            padding: 0;
        }
        .primary-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #ff6ec7, #7f5af0);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.25s ease;
        }
        .primary-btn:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #ff5cc0, #6f49e0);
        }
        .auth-link {
            text-align: center;
            margin-top: 16px;
            color: #cbd5e1;
            font-size: 14px;
        }
        .auth-link a {
            color: #ff9bff;
            font-weight: 700;
            text-decoration: none;
        }
        .message-box {
            min-height: 24px;
            font-size: 14px;
            color: #ff9b9d;
            font-weight: 600;
        }
        .success-message {
            color: #7ad29a;
        }
        @media (max-width: 760px) {
            .auth-page {
                padding: 24px 16px;
            }
            .auth-left {
                padding: 32px 24px;
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="fb-root"></div>
    <div class="auth-page">
        <div class="auth-left">
            <h1>Đăng ký để mua sắm cùng N&L Shop</h1>
            <p>Đăng ký ngay để nhận ưu đãi và theo dõi đơn hàng của bạn một cách dễ dàng.</p>
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="VD: Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" placeholder="VD: 0123456789" required>
                </div>
                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" name="address" placeholder="VD: 123 Đường Ngô Quyền, Hà Nội" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="VD: nguyenvana@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Tối thiểu 6 ký tự" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsAgreement">
                        Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách quyền riêng tư</a>.
                    </label>
                </div>
                <button type="submit" class="primary-btn">Đăng ký</button>
                <div id="errorMessage" class="message-box"></div>
                <div id="successMessage" class="message-box success-message"></div>
            </form>
            <p class="auth-link">Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function setRegisterError(message) {
            const errorMessage = document.getElementById('errorMessage');
            if (errorMessage) errorMessage.textContent = message || '';
        }
        function setRegisterSuccess(message) {
            const successMessage = document.getElementById('successMessage');
            if (successMessage) successMessage.textContent = message || '';
        }
        function termsAccepted() {
            const checkbox = document.getElementById('termsAgreement');
            return checkbox ? checkbox.checked : true;
        }
        async function handleGoogleLogin() {
            setRegisterError('');
            if (!termsAccepted()) {
                setRegisterError('Vui lòng đồng ý điều khoản sử dụng trước khi tiếp tục.');
                return;
            }
            try {
                await googleLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setRegisterError(error.message || 'Đăng ký Google không thành công.');
            }
        }
        async function handleFacebookLogin() {
            setRegisterError('');
            if (!termsAccepted()) {
                setRegisterError('Vui lòng đồng ý điều khoản sử dụng trước khi tiếp tục.');
                return;
            }
            try {
                await facebookLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setRegisterError(error.message || 'Đăng ký Facebook không thành công.');
            }
        }
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            if (successMessage) successMessage.textContent = '';
            if (errorMessage) errorMessage.textContent = '';

            if (!fullname || !phone || !address || !email || !password || !confirmPassword) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng điền đầy đủ thông tin.';
                return;
            }
            if (!termsAccepted()) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng đồng ý với điều khoản sử dụng trước khi đăng ký.';
                return;
            }
            if (password !== confirmPassword) {
                if (errorMessage) errorMessage.textContent = 'Mật khẩu không trùng khớp!';
                return;
            }

            const result = await register(fullname, phone, address, email, password);
            if (result) {
                if (successMessage) successMessage.textContent = 'Đăng ký thành công! Chuyển sang trang đăng nhập...';
                setTimeout(() => { window.location.href = 'login.html'; }, 1400);
            } else {
                if (errorMessage) errorMessage.textContent = 'Email hoặc tài khoản đã tồn tại. Vui lòng thử lại.';
            }
        });

        function togglePasswordVisibility(fieldId, button) {
            const input = document.getElementById(fieldId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
