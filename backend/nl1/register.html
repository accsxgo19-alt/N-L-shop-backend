<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-9b8rBQcoC0Zj7VdF+Y4Bx1tO6gU6WNLV0jG1lF6cRsm8FfE1uvA0kVZf+9+W5YzCFn4hXkOatFi9bDq0zE+Jw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f1ff 0%, #feffff 46%, #f2e8ff 100%);
            color: #24114a;
        }
        .auth-page {
            max-width: 1220px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            align-items: center;
            min-height: 100vh;
        }
        .auth-left {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(82, 16, 132, 0.15);
            padding: 36px 40px;
        }
        .auth-right {
            min-height: 560px;
            border-radius: 30px;
            overflow: hidden;
            background: linear-gradient(160deg, #f7e7ff 0%, #e5d7ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-right img {
            width: 100%;
            height: auto;
            object-fit: cover;
            max-height: 620px;
            border-radius: 30px;
        }
        .auth-left h1 {
            margin: 0 0 14px;
            font-size: 36px;
            line-height: 1.05;
        }
        .auth-left p {
            margin: 0 0 28px;
            color: #6f5f8d;
            font-size: 16px;
            line-height: 1.75;
        }
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid #e7e1f7;
            background: #faf6ff;
            color: #2f2051;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 50px rgba(90, 43, 167, 0.12);
        }
        .social-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }
        .social-btn span {
            display: inline-flex;
            align-items: center;
            line-height: 1;
        }
        .social-google {
            border-color: #dfe3ea;
            background: #ffffff;
        }
        .social-facebook {
            border-color: #dae1fb;
            background: #f5f7ff;
            color: #274a9f;
        }
        .social-phone {
            border-color: #d8f2ff;
            background: #f3fcff;
            color: #0f5d79;
        }
        .register-form {
            display: grid;
            gap: 18px;
        }
        .form-group {
            display: grid;
            gap: 10px;
        }
        .form-group label {
            font-size: 14px;
            color: #5f4c7f;
        }
        .form-group input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid #e9e1f5;
            padding: 16px 18px;
            font-size: 15px;
            background: #fbf8ff;
            color: #2a1e46;
        }
        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: #5f4c7f;
            font-size: 14px;
            line-height: 1.5;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            accent-color: #8b3dff;
        }
        .phone-auth-panel {
            display: none;
            margin-bottom: 24px;
            padding: 22px;
            border: 1px solid #e7e1f7;
            border-radius: 20px;
            background: #f7f1ff;
        }
        .phone-auth-panel h3 {
            margin: 0 0 16px;
            font-size: 18px;
            color: #24114a;
        }
        .phone-auth-panel .message-box {
            min-height: 20px;
            color: #1f7a28;
        }
        .password-field {
            position: relative;
        }
        .password-field input {
            width: 100%;
            padding-right: 54px;
        }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #665b84;
            font-size: 18px;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }
        .primary-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #8b3dff, #4f20c8);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease;
        }
        .primary-btn:hover {
            background: linear-gradient(135deg, #7b2ce0, #3d18b0);
        }
        .auth-link {
            text-align: center;
            margin-top: 16px;
            color: #5f4c7f;
            font-size: 14px;
        }
        .auth-link a {
            color: #5c3f9c;
            font-weight: 700;
            text-decoration: none;
        }
        .message-box {
            min-height: 24px;
            font-size: 14px;
            color: #da1e37;
            font-weight: 600;
        }
        .success-message {
            color: #1f7a28;
        }
        @media (max-width: 1024px) {
            .auth-page {
                grid-template-columns: 1fr;
            }
            .auth-right {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>
    <div id="fb-root"></div>
    <div class="auth-page">
        <div class="auth-left">
            <h1>Đăng ký để mua sắm cùng N&L Shop</h1>
            <p>Đăng ký ngay để nhận ưu đãi và theo dõi đơn hàng của bạn một cách dễ dàng.</p>
            <div class="social-list">
                <button type="button" class="social-btn social-google" onclick="handleGoogleLogin()">
                    <span class="social-icon"><img src="img/google.png" alt="Google"></span>
                    <span>Tiếp tục với Google</span>
                </button>
                <button type="button" class="social-btn social-facebook" onclick="handleFacebookLogin()">
                    <span class="social-icon"><img src="img/fb.jfif" alt="Facebook"></span>
                    <span>Tiếp tục với Facebook</span>
                </button>
                <button type="button" class="social-btn social-phone" onclick="window.location.href='phone-auth.html?mode=register'">
                    <span class="social-icon"><img src="img/phone.png" alt="Phone"></span>
                    <span>Tiếp tục với Số điện thoại</span>
                </button>
            </div>
            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="VD: Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" placeholder="VD: 0123456789" required>
                </div>
                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" name="address" placeholder="VD: 123 Đường Ngô Quyền, Hà Nội" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="VD: nguyenvana@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Tối thiểu 6 ký tự" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsAgreement">
                        Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách quyền riêng tư</a>.
                    </label>
                </div>
                <button type="submit" class="primary-btn">Đăng ký</button>
                <div id="errorMessage" class="message-box"></div>
                <div id="successMessage" class="message-box success-message"></div>
            </form>
            <p class="auth-link">Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
        </div>
        <div class="auth-right">
            <img src="img/anhpopup.png" alt="Fashion design">
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function setRegisterError(message) {
            const errorMessage = document.getElementById('errorMessage');
            if (errorMessage) errorMessage.textContent = message || '';
        }
        function setRegisterSuccess(message) {
            const successMessage = document.getElementById('successMessage');
            if (successMessage) successMessage.textContent = message || '';
        }
        function termsAccepted() {
            const checkbox = document.getElementById('termsAgreement');
            return checkbox ? checkbox.checked : true;
        }
        async function handleGoogleLogin() {
            setRegisterError('');
            if (!termsAccepted()) {
                setRegisterError('Vui lòng đồng ý điều khoản sử dụng trước khi tiếp tục.');
                return;
            }
            try {
                await googleLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setRegisterError(error.message || 'Đăng ký Google không thành công.');
            }
        }
        async function handleFacebookLogin() {
            setRegisterError('');
            if (!termsAccepted()) {
                setRegisterError('Vui lòng đồng ý điều khoản sử dụng trước khi tiếp tục.');
                return;
            }
            try {
                await facebookLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setRegisterError(error.message || 'Đăng ký Facebook không thành công.');
            }
        }
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            if (successMessage) successMessage.textContent = '';
            if (errorMessage) errorMessage.textContent = '';

            if (!fullname || !phone || !address || !email || !password || !confirmPassword) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng điền đầy đủ thông tin.';
                return;
            }
            if (!termsAccepted()) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng đồng ý với điều khoản sử dụng trước khi đăng ký.';
                return;
            }
            if (password !== confirmPassword) {
                if (errorMessage) errorMessage.textContent = 'Mật khẩu không trùng khớp!';
                return;
            }

            const result = await register(fullname, phone, address, email, password);
            if (result) {
                if (successMessage) successMessage.textContent = 'Đăng ký thành công! Chuyển sang trang đăng nhập...';
                setTimeout(() => { window.location.href = 'login.html'; }, 1400);
            } else {
                if (errorMessage) errorMessage.textContent = 'Email hoặc tài khoản đã tồn tại. Vui lòng thử lại.';
            }
        });

        function togglePasswordVisibility(fieldId, button) {
            const input = document.getElementById(fieldId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
