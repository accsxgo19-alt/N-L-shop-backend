<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - N&L Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-9b8rBQcoC0Zj7VdF+Y4Bx1tO6gU6WNLV0jG1lF6cRsm8FfE1uvA0kVZf+9+W5YzCFn4hXkOatFi9bDq0zE+Jw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a2847 50%, #0f172a 100%);
            color: #f8fafc;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(127, 90, 240, 0.18), transparent 24%),
                        radial-gradient(circle at 85% 15%, rgba(255, 110, 199, 0.14), transparent 26%),
                        radial-gradient(circle at 50% 80%, rgba(0, 194, 255, 0.08), transparent 20%);
            pointer-events: none;
            z-index: -1;
        }
        .auth-page {
            max-width: 780px;
            margin: 0 auto;
            padding: 36px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-left {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 32px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.32);
            padding: 42px 42px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            backdrop-filter: blur(24px);
        }
        .auth-left h1 {
            margin: 0 0 10px;
            font-size: 38px;
            line-height: 1.05;
            color: #ffffff;
        }
        .auth-left p {
            margin: 0 0 24px;
            color: #c8d1ea;
            font-size: 16px;
            line-height: 1.8;
        }
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 50px rgba(90, 43, 167, 0.12);
            background: rgba(255, 255, 255, 0.12);
        }
        .social-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }
        .social-btn span {
            display: inline-flex;
            align-items: center;
            line-height: 1;
        }
        .social-google {
            color: #f8fafc;
        }
        .social-facebook {
            color: #f8fafc;
        }
        .social-phone {
            color: #f8fafc;
        }
        .form-panel {
            padding: 0;
        }
        .form-panel h2 {
            margin: 0 0 15px;
            font-size: 24px;
            color: #ffffff;
        }
        .input-group {
            display: grid;
            gap: 14px;
            margin-bottom: 18px;
        }
        .input-group label {
            font-size: 14px;
            color: #cbd5e1;
        }
        .input-group input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            padding: 16px 18px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-group input:focus {
            border-color: rgba(127, 90, 240, 0.7);
            box-shadow: 0 0 0 4px rgba(127, 90, 240, 0.14);
        }
        .password-field {
            position: relative;
        }
        .password-field input {
            width: 100%;
            padding-right: 54px;
        }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            font-size: 18px;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border-radius: 12px;
            padding: 0;
        }
        .primary-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #ff6ec7, #7f5af0);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.25s ease;
        }
        .primary-btn:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #ff5cc0, #6f49e0);
        }
        .forgot-link-row,
        .auth-row {
            text-align: center;
            margin: 12px 0 0;
            font-size: 14px;
        }
        .forgot-link-row {
            margin-top: 16px;
        }
        .forgot-link,
        .auth-row a {
            color: #8bd1ff;
            font-weight: 700;
            text-decoration: none;
        }
        .auth-row a {
            color: #ff9bff;
        }
        .forgot-link-row a:hover,
        .auth-row a:hover {
            color: #d8a4ff;
        }
        .forgot-link:hover {
            color: #d8a4ff;
        }
        .message-box {
            min-height: 24px;
            font-size: 14px;
            color: #ff9b9d;
            font-weight: 600;
        }
        @media (max-width: 760px) {
            .auth-page {
                padding: 24px 16px;
            }
            .auth-left {
                padding: 32px 24px;
                border-radius: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="fb-root"></div>
    <div class="auth-page">
        <div class="auth-left">
            <h1>Đăng nhập để mua sắm cùng N&L Shop</h1>
            <p>Đăng nhập để tiếp tục với tài khoản của bạn và theo dõi đơn hàng.</p>
            <div class="form-panel">
                <h2>Đăng nhập</h2>
                <form id="loginForm" class="register-form">
                    <div class="input-group">
                        <label for="loginIdentifier">Email hoặc Số điện thoại</label>
                        <input id="loginIdentifier" type="text" placeholder="Nhập email hoặc số điện thoại" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Mật khẩu</label>
                        <div class="password-field">
                            <input id="loginPassword" type="password" placeholder="Nhập mật khẩu" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="primary-btn">Đăng nhập</button>
                    <div id="loginError" class="message-box"></div>
                    <p class="forgot-link-row"><a class="forgot-link" href="reset-password.html">Quên mật khẩu?</a></p>
                </form>
            </div>
            <div class="social-list">
                <button type="button" class="social-btn social-google" onclick="handleGoogleLogin()">
                    <span class="social-icon"><img src="img/google.png" alt="Google"></span>
                    <span>Tiếp tục với Google</span>
                </button>
                <button type="button" class="social-btn social-facebook" onclick="handleFacebookLogin()">
                    <span class="social-icon"><img src="img/fb.png" alt="Facebook"></span>
                    <span>Tiếp tục với Facebook</span>
                </button>
                <button type="button" class="social-btn social-phone" onclick="window.location.href='phone-auth.html?mode=login'">
                    <span class="social-icon"><img src="img/phone.png" alt="Phone"></span>
                    <span>Tiếp tục với Số điện thoại</span>
                </button>
                <p class="auth-row">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function setLoginError(message) {
            const errorMessage = document.getElementById('loginError');
            if (errorMessage) errorMessage.textContent = message || '';
        }

        async function handleGoogleLogin() {
            setLoginError('');
            try {
                await googleLogin();
                const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectUrl;
            } catch (error) {
                setLoginError(error.message || 'Đăng nhập Google không thành công.');
            }
        }

        async function handleFacebookLogin() {
            setLoginError('');
            try {
                await facebookLogin();
                const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectUrl;
            } catch (error) {
                setLoginError(error.message || 'Đăng nhập Facebook không thành công.');
            }
        }

        function togglePassword(fieldId, button) {
            const input = document.getElementById(fieldId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorMessage = document.getElementById('loginError');
            if (errorMessage) errorMessage.textContent = '';
            if (!identifier || !password) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng nhập email/số điện thoại và mật khẩu.';
                return;
            }
            const success = await login(identifier, password);
            if (success) {
                const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectUrl;
            } else {
                if (errorMessage) errorMessage.textContent = 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
            }
        });
    </script>
</body>
</html>
'@
Set-Content -Path '.\login.html' -Value $login -Encoding UTF8
