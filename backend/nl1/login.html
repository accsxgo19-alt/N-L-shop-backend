<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-9b8rBQcoC0Zj7VdF+Y4Bx1tO6gU6WNLV0jG1lF6cRsm8FfE1uvA0kVZf+9+W5YzCFn4hXkOatFi9bDq0zE+Jw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8f1ff 0%, #fff 46%, #f6f0ff 100%);
            color: #24114a;
        }
        .auth-page {
            max-width: 1220px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 30px;
            align-items: stretch;
            min-height: 100vh;
        }
        .auth-left {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(82, 16, 132, 0.15);
            padding: 36px 40px;
            display: flex;
            flex-direction: column;
        }
        .auth-right {
            min-height: 0;
            border-radius: 30px;
            overflow: hidden;
            background: linear-gradient(160deg, #f7e7ff 0%, #e5d7ff 100%);
            display: flex;
            align-items: stretch;
            justify-content: center;
        }
        .auth-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 30px;
        }
        .auth-left h1 {
            margin: 0 0 14px;
            font-size: 36px;
            line-height: 1.05;
        }
        .auth-left p {
            margin: 0 0 28px;
            color: #6f5f8d;
            font-size: 16px;
            line-height: 1.75;
        }
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 16px;
            border-radius: 16px;
            border: 1px solid #e7e1f7;
            background: #faf6ff;
            color: #2f2051;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }
        .social-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 50px rgba(90, 43, 167, 0.12);
        }
        .social-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .social-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }
        .social-btn span {
            display: inline-flex;
            align-items: center;
            line-height: 1;
        }
        .social-google {
            border-color: #dfe3ea;
            background: #ffffff;
        }
        .social-facebook {
            border-color: #dae1fb;
            background: #f5f7ff;
            color: #274a9f;
        }
        .social-phone {
            border-color: #d8f2ff;
            background: #f3fcff;
            color: #0f5d79;
        }
        .form-panel {
            padding: 0;
        }
        .input-group {
            display: grid;
            gap: 18px;
            margin-bottom: 18px;
        }
        .input-group label {
            font-size: 14px;
            color: #5f4c7f;
        }
        .input-group input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid #e9e1f5;
            padding: 16px 18px;
            font-size: 15px;
            background: #fbf8ff;
            color: #2a1e46;
        }
        .password-field {
            position: relative;
        }
        .password-field input {
            width: 100%;
            padding-right: 54px;
        }
        .toggle-password {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #665b84;
            font-size: 18px;
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }
        .primary-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #8b3dff, #4f20c8);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.25s ease;
        }
        .primary-btn:hover {
            background: linear-gradient(135deg, #7b2ce0, #3d18b0);
        }
        .auth-link {
            text-align: center;
            margin-top: 16px;
            color: #5f4c7f;
            font-size: 14px;
        }
        .auth-link a {
            color: #5c3f9c;
            font-weight: 700;
            text-decoration: none;
        }
        .message-box {
            min-height: 24px;
            font-size: 14px;
            color: #da1e37;
            font-weight: 600;
        }
        @media (max-width: 1024px) {
            .auth-page {
                grid-template-columns: 1fr;
            }
            .auth-right {
                min-height: 320px;
            }
        }
    </style>
</head>
<body>
    <div id="fb-root"></div>
    <div class="auth-page">
        <div class="auth-left">
            <h1>Đăng nhập để mua sắm cùng N&L Shop</h1>
            <p>Đăng nhập để tiếp tục với tài khoản của bạn và theo dõi đơn hàng.</p>
            <div class="form-panel">
                <h2>Đăng nhập</h2>
                <form id="loginForm" class="register-form">
                    <div class="input-group">
                        <label for="loginIdentifier">Email hoặc Số điện thoại</label>
                        <input id="loginIdentifier" type="text" placeholder="Nhập email hoặc số điện thoại" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Mật khẩu</label>
                        <div class="password-field">
                            <input id="loginPassword" type="password" placeholder="Nhập mật khẩu" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="primary-btn">Đăng nhập</button>
                    <div id="loginError" class="message-box"></div>
                </form>
                <p class="auth-link">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
            </div>
            <div class="social-list">
                <button type="button" class="social-btn social-google" onclick="handleGoogleLogin()">
                    <span class="social-icon"><img src="img/google.png" alt="Google"></span>
                    <span>Tiếp tục với Google</span>
                </button>
                <button type="button" class="social-btn social-facebook" onclick="handleFacebookLogin()">
                    <span class="social-icon"><img src="img/fb.jfif" alt="Facebook"></span>
                    <span>Tiếp tục với Facebook</span>
                </button>
                <button type="button" class="social-btn social-phone" onclick="window.location.href='phone-auth.html?mode=login'">
                    <span class="social-icon"><img src="img/phone.png" alt="Phone"></span>
                    <span>Tiếp tục với Số điện thoại</span>
                </button>
            </div>
        </div>
        <div class="auth-right">
            <img src="img/anhpopup.png" alt="Fashion design">
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function setLoginError(message) {
            const errorMessage = document.getElementById('loginError');
            if (errorMessage) errorMessage.textContent = message || '';
        }

        async function handleGoogleLogin() {
            setLoginError('');
            try {
                await googleLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setLoginError(error.message || 'Đăng nhập Google không thành công.');
            }
        }

        async function handleFacebookLogin() {
            setLoginError('');
            try {
                await facebookLogin();
                window.location.href = 'index.html';
            } catch (error) {
                setLoginError(error.message || 'Đăng nhập Facebook không thành công.');
            }
        }

        function togglePassword(fieldId, button) {
            const input = document.getElementById(fieldId);
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorMessage = document.getElementById('loginError');
            if (errorMessage) errorMessage.textContent = '';
            if (!identifier || !password) {
                if (errorMessage) errorMessage.textContent = 'Vui lòng nhập email/số điện thoại và mật khẩu.';
                return;
            }
            const success = await login(identifier, password);
            if (success) {
                window.location.href = 'index.html';
            } else {
                if (errorMessage) errorMessage.textContent = 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
            }
        });
    </script>
</body>
</html>
'@
Set-Content -Path '.\login.html' -Value $login -Encoding UTF8
