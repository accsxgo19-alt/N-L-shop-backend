<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản của tôi - N&L Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body class="account-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a href="index.html" class="brand-link" aria-label="Về trang chủ">
                    <h1>🛍️ N&L Shop</h1>
                </a>
            </div>
            <ul class="navbar-menu">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="index.html#products">Sản phẩm</a></li>
                <li><a href="new-products.html">Mới nhất</a></li>
                <li class="user-menu">
                    <a id="userDisplay" class="user-display" href="login.html">👤 Đăng nhập</a>
                    <div class="dropdown">
                        <a href="account.html" id="accountLink" style="display:none">Tài khoản</a>
                        <a href="orders.html" id="ordersLink" style="display:none">Đơn hàng</a>
                        <a href="purchase-history.html" id="historyLink" style="display:none">Lịch sử mua hàng</a>
                        <a href="admin.html" id="adminLink" style="display:none">Quản lý</a>
                        <button id="logoutBtn" style="display:none" onclick="logout()">Đăng xuất</button>
                        <a href="login.html" id="loginLink">Đăng nhập</a>
                        <a href="register.html" id="registerLink">Đăng ký</a>
                    </div>
                </li>
                <li><a href="cart.html" class="cart-link">🛒 Giỏ hàng</a></li>
            </ul>
        </div>
    </nav>

    <!-- Account Content -->
    <main class="page-shell account-page-shell">
        <div class="page-container">
            <div class="container">
            <div class="page-header">
                <h2>Thông Tin Tài Khoản</h2>
            </div>
            <div class="page-card account-card">
                <form id="accountForm">
                <div class="form-group">
                    <label for="fullname">Họ và tên:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" disabled>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Địa chỉ:</label>
                    <textarea id="address" name="address" required></textarea>
                </div>

                <h3>Thay đổi mật khẩu</h3>
                <div class="form-group">
                    <label for="currentPassword">Mật khẩu hiện tại:</label>
                    <input type="password" id="currentPassword" name="currentPassword">
                </div>
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới:</label>
                    <input type="password" id="newPassword" name="newPassword">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu mới:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cập nhật thông tin</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
            </form>
            </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="nav-container">
            <div class="container">
            <p>&copy; 2026 N&L Shop. Tất cả quyền được bảo lưu.</p>
            <p>Liên hệ: nlshop213@gmail.com | Điện thoại: 0793244405</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="chatbot-knowledge.js"></script>
    <script src="chatbot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            
            if (!isLoggedIn()) {
                alert('Vui lòng đăng nhập!');
                window.location.href = 'login.html';
                return;
            }

            const currentUser = getCurrentUser();
            if (currentUser) {
                document.getElementById('fullname').value = currentUser.fullname || '';
                document.getElementById('email').value = currentUser.email || '';
                document.getElementById('phone').value = currentUser.phone || '';
                document.getElementById('address').value = currentUser.address || '';
            }

            loadUserData();

            document.getElementById('accountForm').addEventListener('submit', function(e) {
                e.preventDefault();
                updateAccount();
            });
        });

        async function loadUserData() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    method: 'GET',
                    headers: getAuthHeaders(),
                });

                if (response.ok) {
                    const result = await response.json();
                    const user = result.user;
                    document.getElementById('fullname').value = user.name || '';
                    document.getElementById('email').value = user.email || '';
                    document.getElementById('phone').value = user.phone || '';
                    document.getElementById('address').value = user.address || '';
                } else {
                    throw new Error('Không thể tải dữ liệu người dùng');
                }
            } catch (error) {
                console.error('Error loading user data:', error);
                document.getElementById('errorMessage').textContent = 'Lỗi khi tải dữ liệu tài khoản.';
            }
        }

        async function updateAccount() {
            const fullname = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            errorMsg.textContent = '';
            successMsg.textContent = '';

            if (!fullname || !phone || !address) {
                errorMsg.textContent = 'Vui lòng điền đầy đủ thông tin!';
                return;
            }

            try {
                // Update basic info
                const updateResponse = await fetch(`${API_BASE}/api/auth/me`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders(),
                    },
                    body: JSON.stringify({
                        name: fullname,
                        phone: phone,
                        address: address,
                    }),
                });

                if (!updateResponse.ok) {
                    const result = await updateResponse.json();
                    throw new Error(result.message || 'Không thể cập nhật tài khoản');
                }

                // Change password if provided
                if (newPassword) {
                    if (!currentPassword) {
                        errorMsg.textContent = 'Vui lòng nhập mật khẩu hiện tại!';
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        errorMsg.textContent = 'Mật khẩu mới không trùng khớp!';
                        return;
                    }

                    const passwordResponse = await fetch(`${API_BASE}/api/auth/change-password`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            ...getAuthHeaders(),
                        },
                        body: JSON.stringify({
                            currentPassword: currentPassword,
                            newPassword: newPassword,
                        }),
                    });

                    if (!passwordResponse.ok) {
                        const result = await passwordResponse.json();
                        throw new Error(result.message || 'Không thể đổi mật khẩu');
                    }

                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                }

                // Update localStorage
                const updateResult = await fetch(`${API_BASE}/api/auth/me`, {
                    method: 'GET',
                    headers: getAuthHeaders(),
                });
                if (updateResult.ok) {
                    const data = await updateResult.json();
                    const user = data.user;
                    saveCurrentUser({
                        id: user.id,
                        email: user.email,
                        name: user.name,
                        phone: user.phone,
                        address: user.address,
                        role: user.role,
                    });
                }

                successMsg.textContent = 'Cập nhật thông tin thành công!';
                setTimeout(() => {
                    successMsg.textContent = '';
                }, 3000);
            } catch (error) {
                console.error('Error updating account:', error);
                errorMsg.textContent = error.message || 'Lỗi khi cập nhật tài khoản';
                }
        }
    </script>
</body>
</html>
